title: "Portal Inwestycyjny"
subtitle: "Inwestycje dla Polaków"
name: "Portal Inwestycyjny"
description: "Kompendium wiedzy o inwestowaniu w Polsce i na świecie. ETF, akcje, obligacje, nieruchomości i więcej."
url: "https://effectiveone.github.io"
baseurl: "/inwestycje"
lang: pl

remote_theme: mmistakes/minimal-mistakes@4.24.0

minimal_mistakes_skin: "default"

timezone: Europe/Warsaw

author:
  name: "Zespół Portal Inwestycyjny"
  bio: "Eksperci w dziedzinie inwestowania"
  location: "Polska"

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

paginate: 10
paginate_path: /page:num/

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

permalink: /:year/:month/:day/:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - Gemfile.lock
  - vendor/
  - .bundle/
